<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="badge">
      <rect x="0" y="0" width="512" height="512" rx="112"/>
    </clipPath>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFD166" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#FFC24B" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FFB020" stop-opacity="0.06"/>
    </linearGradient>
    <radialGradient id="pool" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFD166" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lensGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFF3D6" stop-opacity="1"/>
      <stop offset="0.6" stop-color="#FFD166" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B1F38"/>
      <stop offset="1" stop-color="#101223"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#badge)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- light pool on the stage floor -->
    <ellipse cx="340" cy="436" rx="170" ry="46" fill="url(#pool)"/>

    <!-- everything aligned on the beam axis: origin = lens center, rotated 40deg -->
    <g transform="translate(178,162) rotate(40)">
      <!-- beam -->
      <polygon points="14,-44 400,-190 400,190 14,44" fill="url(#beam)"/>
      <!-- inner hot beam -->
      <polygon points="14,-30 400,-110 400,110 14,30" fill="#FFE9B8" opacity="0.28"/>

      <!-- rear cap -->
      <rect x="-176" y="-34" width="44" height="68" rx="16" fill="#7B84A8"/>

      <!-- spotlight body -->
      <rect x="-150" y="-56" width="152" height="112" rx="26" fill="#E9ECF7"/>
      <!-- body vent lines -->
      <line x1="-112" y1="-30" x2="-112" y2="30" stroke="#B9C0D9" stroke-width="10" stroke-linecap="round"/>
      <line x1="-82" y1="-34" x2="-82" y2="34" stroke="#B9C0D9" stroke-width="10" stroke-linecap="round"/>

      <!-- lens ring : open arc = "open" source -->
      <circle cx="0" cy="0" r="58" fill="#101223"/>
      <path d="M 0,-58 A 58 58 0 1 1 -0.1,-58" fill="none" stroke="#FFD166" stroke-width="16"
            stroke-linecap="round" stroke-dasharray="303 62" stroke-dashoffset="-24"/>
      <!-- lens glow -->
      <circle cx="0" cy="0" r="38" fill="url(#lensGlow)"/>
    </g>

    <!-- sparkles in the beam -->
    <circle cx="330" cy="300" r="7" fill="#FFF3D6" opacity="0.9"/>
    <circle cx="392" cy="366" r="5" fill="#FFF3D6" opacity="0.7"/>
    <circle cx="290" cy="382" r="4" fill="#FFF3D6" opacity="0.55"/>
  </g>
</svg>
