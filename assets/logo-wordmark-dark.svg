      <stop offset="0.55" stop-color="#FFC24B" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FFB020" stop-opacity="0.06"/>
    </linearGradient>
    <radialGradient id="pool" cx="0.5" cy="0.5" r="0.5">
